# SFT config for Wikipedia RAG cited-answer tuning

model:
  base: "Qwen/Qwen3-1.7B"
  output: "outputs/wiki-rag-answer"

dataset:
  name: "data/wiki_rag_answer/"
  text_field: "text"
  split: "train"
  eval_split: 0.15

training:
  precision: "fp16"
  epochs: 4
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1.5e-4
  max_length: 1024
  warmup_ratio: 0.05
  lr_scheduler: "cosine"
  save_interval_minutes: 30
  save_steps: 200
  save_total_limit: 3

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

tracking:
  project: "qmd-wiki-rag-answer"
  run_name: "sft-wiki-rag-answer"
